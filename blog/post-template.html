<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f8fa" />
    <meta name="description" content="{{DESCRIPTION}}" />
    <link rel="canonical" href="https://kdharmarajan.com/blog/posts/{{SLUG}}.html" />
    <link rel="icon" href="/favicon.ico" />
    <script src="/theme.js?v=20260610-8"></script>
    <link rel="stylesheet" href="/styles.css?v=20260610-8" />
    <title>{{TITLE}} · Karthik Dharmarajan</title>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <main id="main" class="post-page">
      <header class="post-header">
        <button class="theme-toggle" type="button" data-theme-toggle>Dark mode</button>
        <p class="eyebrow"><a href="/blog/">Notes from the lab</a></p>
        <h1>{{TITLE}}</h1>
        <p class="post-meta"><time datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time> · {{READ_TIME}} min read</p>
      </header>

      <article class="post-content">
        <p>{{DESCRIPTION}}</p>
        <h2>First section</h2>
        <p>Write the post here.</p>
      </article>

      <section class="comments" aria-labelledby="comments-heading">
        <h2 id="comments-heading">Comments</h2>
        <div class="giscus" data-giscus-container></div>
        <script src="/blog/giscus-loader.js"></script>
      </section>
    </main>
  </body>
</html>
